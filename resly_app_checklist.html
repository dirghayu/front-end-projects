<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resly App Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem 1rem; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 12px; }
  .progress-bar { background: #e8e8e4; border-radius: 99px; height: 6px; margin: 10px 0 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.3s ease; }
  .progress-label { font-size: 12px; color: #888; margin-bottom: 1.5rem; }
  .app-card { background: #fff; border: 1px solid #e4e4e0; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .app-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; user-select: none; }
  .app-header:hover { background: #f5f5f2; }
  .app-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .app-title { flex: 1; }
  .app-title strong { font-size: 14px; font-weight: 500; display: block; }
  .app-title span { font-size: 12px; color: #888; }
  .app-progress { font-size: 12px; color: #888; white-space: nowrap; }
  .chevron { font-size: 11px; color: #aaa; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }
  .app-body { border-top: 1px solid #e8e8e4; padding: 12px 16px; display: none; }
  .app-body.open { display: block; }
  .tags { margin-bottom: 10px; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-right: 4px; }
  .tag-node { background: #E1F5EE; color: #0F6E56; }
  .tag-react { background: #E6F1FB; color: #185FA5; }
  .tag-ai { background: #FAEEDA; color: #854F0B; }
  .tag-next { background: #EEEDFE; color: #534AB7; }
  .section-label { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin: 14px 0 6px; }
  .section-label:first-of-type { margin-top: 0; }
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 5px 0; cursor: pointer; }
  .task input[type=checkbox] { margin-top: 2px; flex-shrink: 0; cursor: pointer; accent-color: #1D9E75; }
  .task-label { font-size: 13px; color: #555; line-height: 1.5; }
  .task-label.done { text-decoration: line-through; color: #bbb; }
  .reset-btn { margin-top: 1rem; font-size: 12px; color: #888; background: none; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; cursor: pointer; }
  .reset-btn:hover { background: #f5f5f2; }
</style>
</head>
<body>
<div class="wrap">
  <h2>Resly — React learning checklist</h2>
  <p class="subtitle">5 apps · 1 day each · build in order</p>
  <div class="progress-bar"><div class="progress-fill" id="global-fill" style="width:0%"></div></div>
  <div class="progress-label" id="global-label">0 of 0 tasks complete</div>
  <div id="apps"></div>
  <button class="reset-btn" onclick="resetAll()">Reset all</button>
</div>

<script>
const apps = [
  {
    title: "Personal finance dashboard",
    stack: ["node","react"],
    desc: "Familiar fintech domain — build React confidence",
    sections: [
      { label: "Setup", tasks: ["Initialise project with create-react-app or Vite","Install axios, recharts (or chart.js)","Create Node.js Express backend with one endpoint"] },
      { label: "Backend (Node.js)", tasks: ["Create GET /transactions endpoint returning mock JSON","Add POST /transactions to add a new entry","Add simple in-memory store or JSON file persistence"] },
      { label: "Frontend (React)", tasks: ["Build income/expense entry form component","Display transactions in a list with delete","Add bar/pie chart using recharts","Show total income, total expenses, net balance as cards"] },
      { label: "Polish", tasks: ["Filter transactions by category","Deploy frontend to Vercel (free)","Test in browser — screenshot for portfolio"] }
    ]
  },
  {
    title: "Job application tracker",
    stack: ["node","react"],
    desc: "Directly useful right now — CRUD mastery",
    sections: [
      { label: "Setup", tasks: ["Initialise project with Vite + React","Node.js backend with express + lowdb or JSON file","Plan data model: company, role, status, date, notes"] },
      { label: "Backend (Node.js)", tasks: ["GET /applications — list all","POST /applications — add new","PATCH /applications/:id — update status","DELETE /applications/:id — remove"] },
      { label: "Frontend (React)", tasks: ["Add application form (company, role, status, date)","Table or card list of all applications","Status badge (applied / interview / offer / rejected)","Click to edit status inline"] },
      { label: "Polish", tasks: ["Filter by status","Sort by date","Deploy to Vercel","Add to GitHub portfolio"] }
    ]
  },
  {
    title: "Team stand-up logger",
    stack: ["next","node"],
    desc: "Intro to Next.js routing and SSR — deploy to Vercel",
    sections: [
      { label: "Setup", tasks: ["Create Next.js app with npx create-next-app","Plan pages: / (today's standups), /history","Use Next.js API routes instead of separate Node server"] },
      { label: "API routes (Next.js)", tasks: ["POST /api/standup — save entry","GET /api/standup — get today's entries","GET /api/standup/history — get all past entries"] },
      { label: "Frontend (React + Next.js)", tasks: ["Standup form: name, did, will do, blockers","Today page shows all team entries as cards","History page lists by date","Add a simple name selector (no auth needed)"] },
      { label: "Polish", tasks: ["Add timestamps","Deploy to Vercel in one command","Share live URL — good for interview demo"] }
    ]
  },
  {
    title: "AI code refactor suggester",
    stack: ["node","react","ai"],
    desc: "Directly addresses Resly's AI tooling requirement",
    sections: [
      { label: "Setup", tasks: ["Get Claude API key from console.anthropic.com","Node.js backend with express","React frontend with textarea input"] },
      { label: "Backend (Node.js)", tasks: ["POST /refactor endpoint — accepts code string","Call Claude API with refactor prompt","Stream or return suggestion as text","Handle errors gracefully"] },
      { label: "Frontend (React)", tasks: ["Textarea for pasting code","Language selector (Java / JavaScript / Python)","Submit button — show loading state","Display suggestion in formatted panel side by side"] },
      { label: "Polish", tasks: ["Add copy-to-clipboard on suggestion","Show diff or before/after view","Deploy and record a short demo video for portfolio"] }
    ]
  },
  {
    title: "Hotel availability checker",
    stack: ["node","react","next"],
    desc: "Resly's exact domain — shows you've done your homework",
    sections: [
      { label: "Setup", tasks: ["Create Next.js project","Plan mock data: rooms, bookings, dates","Think about Resly's actual product as inspiration"] },
      { label: "Backend / API routes", tasks: ["GET /api/rooms — list all rooms with type and price","POST /api/bookings — check availability for date range","POST /api/bookings/confirm — create booking","Mock availability logic (no DB needed)"] },
      { label: "Frontend (React)", tasks: ["Date range picker (use react-datepicker)","Room type filter (single/double/suite)","Availability results as cards with price","Book now button — show confirmation modal"] },
      { label: "Polish", tasks: ["Show booked vs available clearly","Add guest count selector","Deploy to Vercel","Write a note in README: built to understand Resly's domain"] }
    ]
  }
];

const colors = ["#1D9E75","#185FA5","#534AB7","#BA7517","#D85A30"];
const lightBg = ["#E1F5EE","#E6F1FB","#EEEDFE","#FAEEDA","#FAECE7"];
const textC = ["#0F6E56","#185FA5","#534AB7","#854F0B","#993C1D"];
const stackTags = {
  node: '<span class="tag tag-node">Node.js</span>',
  react: '<span class="tag tag-react">React</span>',
  ai: '<span class="tag tag-ai">Claude API</span>',
  next: '<span class="tag tag-next">Next.js</span>'
};

let state = {};

function getKey(ai, si, ti) { return `${ai}-${si}-${ti}`; }

function save() { try { localStorage.setItem('resly_cl', JSON.stringify(state)); } catch(e){} }

function load() {
  try { const d = localStorage.getItem('resly_cl'); if (d) state = JSON.parse(d); } catch(e) { state = {}; }
}

function countApp(ai) {
  let total = 0, done = 0;
  apps[ai].sections.forEach((s, si) => s.tasks.forEach((_, ti) => { total++; if (state[getKey(ai,si,ti)]) done++; }));
  return { total, done };
}

function countAll() {
  let total = 0, done = 0;
  apps.forEach((_, ai) => { const c = countApp(ai); total += c.total; done += c.done; });
  return { total, done };
}

function updateGlobal() {
  const { total, done } = countAll();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('global-fill').style.width = pct + '%';
  document.getElementById('global-label').textContent = done + ' of ' + total + ' tasks complete';
}

function toggle(ai, si, ti) {
  const k = getKey(ai, si, ti);
  state[k] = !state[k];
  save();
  const cb = document.getElementById('cb-' + k);
  const lbl = document.getElementById('lbl-' + k);
  if (cb) cb.checked = state[k];
  if (lbl) lbl.className = 'task-label' + (state[k] ? ' done' : '');
  document.getElementById('app-progress-' + ai).textContent = countApp(ai).done + ' / ' + countApp(ai).total;
  updateGlobal();
}

function toggleApp(ai) {
  document.getElementById('body-' + ai).classList.toggle('open');
  document.getElementById('chev-' + ai).classList.toggle('open');
}

function resetAll() {
  state = {}; save();
  document.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
  document.querySelectorAll('.task-label').forEach(l => l.classList.remove('done'));
  apps.forEach((_, ai) => document.getElementById('app-progress-' + ai).textContent = '0 / ' + countApp(ai).total);
  updateGlobal();
}

function render() {
  load();
  document.getElementById('apps').innerHTML = apps.map((app, ai) => {
    const { total, done } = countApp(ai);
    const tags = app.stack.map(s => stackTags[s]).join('');
    const sections = app.sections.map((sec, si) =>
      `<div class="section-label">${sec.label}</div>` +
      sec.tasks.map((task, ti) => {
        const k = getKey(ai, si, ti);
        const checked = state[k] ? 'checked' : '';
        const doneClass = state[k] ? ' done' : '';
        return `<label class="task"><input type="checkbox" id="cb-${k}" ${checked} onchange="toggle(${ai},${si},${ti})"><span class="task-label${doneClass}" id="lbl-${k}">${task}</span></label>`;
      }).join('')
    ).join('');
    return `<div class="app-card">
      <div class="app-header" onclick="toggleApp(${ai})">
        <div class="app-num" style="background:${lightBg[ai]};color:${textC[ai]}">${ai+1}</div>
        <div class="app-title"><strong>${app.title}</strong><span>${app.desc}</span></div>
        <span class="app-progress" id="app-progress-${ai}">${done} / ${total}</span>
        <span class="chevron" id="chev-${ai}">▼</span>
      </div>
      <div class="app-body" id="body-${ai}"><div class="tags">${tags}</div>${sections}</div>
    </div>`;
  }).join('');
  updateGlobal();
}

render();
</script>
</body>
</html>
