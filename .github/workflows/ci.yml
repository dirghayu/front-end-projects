name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/personal-finance-dashboard/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/personal-finance-dashboard/backend/package-lock.json
      - run: npm ci
      - run: npm test

  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/personal-finance-dashboard/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/personal-finance-dashboard/frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --run

  deploy:
    name: Deploy to Firebase
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: apps/personal-finance-dashboard/backend
        run: npm ci

      - name: Build backend
        working-directory: apps/personal-finance-dashboard/backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: apps/personal-finance-dashboard/frontend
        run: npm ci

      - name: Build frontend
        working-directory: apps/personal-finance-dashboard/frontend
        run: npm run build

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        working-directory: apps/personal-finance-dashboard
        run: firebase deploy --non-interactive --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
