name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/personal-finance-dashboard/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/personal-finance-dashboard/backend/package-lock.json
      - run: npm ci
      - run: npm test

  test-frontend:
    name: Finance frontend — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/personal-finance-dashboard/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/personal-finance-dashboard/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  test-hotel-backend:
    name: Hotel backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/hotel-admin-dashboard/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/hotel-admin-dashboard/backend/package-lock.json
      - run: npm ci
      - run: npm test

  test-hotel-frontend:
    name: Hotel frontend — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/hotel-admin-dashboard/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/hotel-admin-dashboard/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run

  deploy:
    name: Deploy to Firebase
    needs: [test-backend, test-frontend, test-hotel-backend, test-hotel-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: apps/personal-finance-dashboard/backend
        run: npm ci

      - name: Build backend
        working-directory: apps/personal-finance-dashboard/backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: apps/personal-finance-dashboard/frontend
        run: npm ci

      - name: Build frontend
        working-directory: apps/personal-finance-dashboard/frontend
        run: npm run build

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        working-directory: apps/personal-finance-dashboard
        run: firebase deploy --non-interactive --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Smoke test — /transactions returns JSON array
        run: |
          RESPONSE=$(curl -sf https://finance-dashboard-e51e4.web.app/transactions)
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys, json; data = json.load(sys.stdin); assert isinstance(data, list), 'Expected JSON array'"

      - name: Install hotel backend dependencies
        working-directory: apps/hotel-admin-dashboard/backend
        run: npm ci

      - name: Build hotel backend
        working-directory: apps/hotel-admin-dashboard/backend
        run: npm run build

      - name: Install hotel frontend dependencies
        working-directory: apps/hotel-admin-dashboard/frontend
        run: npm ci

      - name: Build hotel frontend
        working-directory: apps/hotel-admin-dashboard/frontend
        run: npm run build

      - name: Deploy hotel app to Firebase
        working-directory: apps/hotel-admin-dashboard
        run: firebase deploy --non-interactive --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Smoke test — /bookings returns JSON array
        run: |
          RESPONSE=$(curl -sf https://hotel-admin-a5563.web.app/bookings)
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys, json; data = json.load(sys.stdin); assert isinstance(data, list), 'Expected JSON array'"
